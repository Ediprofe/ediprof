<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Curva de solubilidad del azúcar en agua</title>
  <desc id="desc">Gráfica de la solubilidad del azúcar en agua con zonas de solución insaturada, saturada y sobresaturada.</desc>
  <defs>
    <style>
      .page { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .plot-bg { fill: #fef2f2; }
      .zone-low { fill: #dcfce7; opacity: 0.9; }
      .grid { stroke: #dbe4ee; stroke-width: 1.2; }
      .axis { stroke: #0f172a; stroke-width: 3.5; }
      .curve-halo { fill: none; stroke: #ffffff; stroke-width: 11; stroke-linecap: round; stroke-linejoin: round; }
      .curve { fill: none; stroke: #2563eb; stroke-width: 6.5; stroke-linecap: round; stroke-linejoin: round; }
      .txt { fill: #0f172a; font-family: Inter, Arial, Helvetica, sans-serif; }
      .title { font-size: 30px; font-weight: 800; }
      .axis-label { font-size: 21px; font-weight: 700; }
      .tick { font-size: 17px; font-weight: 500; }
      .zone-box { fill: rgba(255,255,255,0.96); stroke-width: 2.2; }
      .zone-text { font-size: 19px; font-weight: 700; }
      .ins-box { stroke: #16a34a; }
      .sat-box { stroke: #d97706; }
      .sup-box { stroke: #dc2626; }
      .ins-text { fill: #166534; }
      .sat-text { fill: #92400e; }
      .sup-text { fill: #991b1b; }
    </style>
    <clipPath id="plot-clip">
      <rect x="160" y="130" width="900" height="470" rx="18"/>
    </clipPath>
  </defs>

  <rect class="page" x="0" y="0" width="1200" height="760"/>
  <rect class="frame" x="48" y="38" width="1104" height="676" rx="28"/>

  <text class="txt title" x="600" y="88" text-anchor="middle">Curva de solubilidad del azúcar en agua</text>

  <g clip-path="url(#plot-clip)">
    <rect class="plot-bg" x="160" y="130" width="900" height="470"/>
    <path class="zone-low" d="M 160 600 L 160 494.3 C 176.7 491.3, 226.7 482.5, 260.0 476.6 C 293.3 470.8, 326.7 465.5, 360.0 459.0 C 393.3 452.5, 426.7 445.7, 460.0 437.9 C 493.3 430.0, 526.7 421.8, 560.0 412.0 C 593.3 402.2, 626.7 390.9, 660.0 379.1 C 693.3 367.4, 726.7 355.6, 760.0 341.5 C 793.3 327.4, 826.7 313.1, 860.0 294.5 C 893.3 275.9, 926.7 254.7, 960.0 229.9 C 993.3 205.0, 1043.3 159.4, 1060.0 145.3 L 1060 600 Z"/>

    <line class="grid" x1="160" y1="600" x2="1060" y2="600"/>
    <line class="grid" x1="160" y1="482.5" x2="1060" y2="482.5"/>
    <line class="grid" x1="160" y1="365" x2="1060" y2="365"/>
    <line class="grid" x1="160" y1="247.5" x2="1060" y2="247.5"/>
    <line class="grid" x1="160" y1="130" x2="1060" y2="130"/>

    <line class="grid" x1="260" y1="130" x2="260" y2="600"/>
    <line class="grid" x1="460" y1="130" x2="460" y2="600"/>
    <line class="grid" x1="660" y1="130" x2="660" y2="600"/>
    <line class="grid" x1="860" y1="130" x2="860" y2="600"/>
    <line class="grid" x1="1060" y1="130" x2="1060" y2="600"/>

    <path class="curve-halo" d="M 160.0 494.3 C 176.7 491.3, 226.7 482.5, 260.0 476.6 C 293.3 470.8, 326.7 465.5, 360.0 459.0 C 393.3 452.5, 426.7 445.7, 460.0 437.9 C 493.3 430.0, 526.7 421.8, 560.0 412.0 C 593.3 402.2, 626.7 390.9, 660.0 379.1 C 693.3 367.4, 726.7 355.6, 760.0 341.5 C 793.3 327.4, 826.7 313.1, 860.0 294.5 C 893.3 275.9, 926.7 254.7, 960.0 229.9 C 993.3 205.0, 1043.3 159.4, 1060.0 145.3"/>
    <path class="curve" d="M 160.0 494.3 C 176.7 491.3, 226.7 482.5, 260.0 476.6 C 293.3 470.8, 326.7 465.5, 360.0 459.0 C 393.3 452.5, 426.7 445.7, 460.0 437.9 C 493.3 430.0, 526.7 421.8, 560.0 412.0 C 593.3 402.2, 626.7 390.9, 660.0 379.1 C 693.3 367.4, 726.7 355.6, 760.0 341.5 C 793.3 327.4, 826.7 313.1, 860.0 294.5 C 893.3 275.9, 926.7 254.7, 960.0 229.9 C 993.3 205.0, 1043.3 159.4, 1060.0 145.3"/>
  </g>

  <line class="axis" x1="160" y1="600" x2="1085" y2="600"/>
  <line class="axis" x1="160" y1="600" x2="160" y2="116"/>

  <text class="txt axis-label" x="610" y="684" text-anchor="middle">Temperatura (°C)</text>
  <text class="txt axis-label" x="92" y="365" text-anchor="middle" transform="rotate(-90 92 365)">Solubilidad (g de azúcar / 100 g de agua)</text>

  <text class="txt tick" x="148" y="606" text-anchor="end">100</text>
  <text class="txt tick" x="148" y="488.5" text-anchor="end">200</text>
  <text class="txt tick" x="148" y="371" text-anchor="end">300</text>
  <text class="txt tick" x="148" y="253.5" text-anchor="end">400</text>
  <text class="txt tick" x="148" y="136" text-anchor="end">500</text>

  <text class="txt tick" x="260" y="628" text-anchor="middle">20</text>
  <text class="txt tick" x="460" y="628" text-anchor="middle">40</text>
  <text class="txt tick" x="660" y="628" text-anchor="middle">60</text>
  <text class="txt tick" x="860" y="628" text-anchor="middle">80</text>
  <text class="txt tick" x="1060" y="628" text-anchor="middle">100</text>

  <rect class="zone-box ins-box" x="212" y="486" width="242" height="50" rx="25"/>
  <text class="txt zone-text ins-text" x="333" y="518" text-anchor="middle">Solución insaturada</text>

  <rect class="zone-box sup-box" x="404" y="166" width="266" height="50" rx="25"/>
  <text class="txt zone-text sup-text" x="537" y="198" text-anchor="middle">Solución sobresaturada</text>

  <rect class="zone-box sat-box" x="760" y="288" width="214" height="50" rx="25"/>
  <text class="txt zone-text sat-text" x="867" y="320" text-anchor="middle">Solución saturada</text>
</svg>
