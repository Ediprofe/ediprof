<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-label="Opciones graficas A B C y D de temperatura del hierro vs tiempo">
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="700" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Opciones de grafica temperatura-tiempo</text>

  <!-- Panel A -->
  <g transform="translate(70,110)">
    <rect x="0" y="0" width="600" height="380" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="20" y="44" font-family="Arial, sans-serif" font-size="38" font-weight="700">A</text>
    <line x1="90" y1="320" x2="540" y2="320" stroke="#111827" stroke-width="3"/>
    <line x1="90" y1="320" x2="90" y2="70" stroke="#111827" stroke-width="3"/>
    <polyline points="90,320 210,210 390,150 520,90" fill="none" stroke="#111827" stroke-width="4"/>
    <text x="330" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Tiempo</text>
    <text x="35" y="195" transform="rotate(-90 35 195)" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">Temperatura (C)</text>
  </g>

  <!-- Panel B -->
  <g transform="translate(730,110)">
    <rect x="0" y="0" width="600" height="380" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="20" y="44" font-family="Arial, sans-serif" font-size="38" font-weight="700">B</text>
    <line x1="90" y1="320" x2="540" y2="320" stroke="#111827" stroke-width="3"/>
    <line x1="90" y1="320" x2="90" y2="70" stroke="#111827" stroke-width="3"/>
    <polyline points="90,320 520,100" fill="none" stroke="#111827" stroke-width="4"/>
    <text x="330" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Tiempo</text>
    <text x="35" y="195" transform="rotate(-90 35 195)" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">Temperatura (C)</text>
  </g>

  <!-- Panel C (correcta, con dos mesetas) -->
  <g transform="translate(70,540)">
    <rect x="0" y="0" width="600" height="380" fill="#fff" stroke="#16a34a" stroke-width="3"/>
    <text x="20" y="44" font-family="Arial, sans-serif" font-size="38" font-weight="700">C</text>
    <line x1="90" y1="320" x2="540" y2="320" stroke="#111827" stroke-width="3"/>
    <line x1="90" y1="320" x2="90" y2="70" stroke="#111827" stroke-width="3"/>
    <polyline points="90,320 190,220 260,220 350,130 430,130 520,85" fill="none" stroke="#111827" stroke-width="4"/>
    <circle cx="190" cy="220" r="5" fill="#111827"/>
    <circle cx="260" cy="220" r="5" fill="#111827"/>
    <circle cx="350" cy="130" r="5" fill="#111827"/>
    <circle cx="430" cy="130" r="5" fill="#111827"/>
    <text x="330" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Tiempo</text>
    <text x="35" y="195" transform="rotate(-90 35 195)" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">Temperatura (C)</text>
  </g>

  <!-- Panel D -->
  <g transform="translate(730,540)">
    <rect x="0" y="0" width="600" height="380" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="20" y="44" font-family="Arial, sans-serif" font-size="38" font-weight="700">D</text>
    <line x1="90" y1="320" x2="540" y2="320" stroke="#111827" stroke-width="3"/>
    <line x1="90" y1="320" x2="90" y2="70" stroke="#111827" stroke-width="3"/>
    <polyline points="90,320 150,290 210,260 270,230 330,200 390,170 450,140 520,90" fill="none" stroke="#111827" stroke-width="4"/>
    <text x="330" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Tiempo</text>
    <text x="35" y="195" transform="rotate(-90 35 195)" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">Temperatura (C)</text>
  </g>
</svg>
