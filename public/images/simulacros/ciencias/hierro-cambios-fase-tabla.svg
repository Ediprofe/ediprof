<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Tabla de temperatura y estado del hierro durante cambios de fase">
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="490" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Registros de temperatura y estado del hierro</text>

  <rect x="90" y="110" width="800" height="340" fill="#fff" stroke="#0f172a" stroke-width="3"/>
  <line x1="370" y1="110" x2="370" y2="450" stroke="#0f172a" stroke-width="3"/>

  <line x1="90" y1="170" x2="890" y2="170" stroke="#0f172a" stroke-width="2"/>
  <line x1="90" y1="226" x2="890" y2="226" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="90" y1="282" x2="890" y2="282" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="90" y1="338" x2="890" y2="338" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="90" y1="394" x2="890" y2="394" stroke="#cbd5e1" stroke-width="2"/>

  <text x="230" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">Temperatura (C)</text>
  <text x="630" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">Estado del hierro</text>

  <text x="230" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">0</text>
  <text x="630" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Solido</text>

  <text x="230" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">750</text>
  <text x="630" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Solido</text>

  <text x="230" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">1535</text>
  <text x="630" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Cambio de solido a liquido</text>

  <text x="230" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">2255</text>
  <text x="630" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Liquido</text>

  <text x="230" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">2750</text>
  <text x="630" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="26">Cambio de liquido a gaseoso</text>
</svg>
