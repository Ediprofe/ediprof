<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-label="Promedio de colonias de bacterias antes y despues de manipulacion en dos panaderias">
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="550" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#111827">Promedio de colonias de bacterias en cada panaderia</text>

  <line x1="150" y1="580" x2="980" y2="580" stroke="#111827" stroke-width="4"/>
  <line x1="150" y1="580" x2="150" y2="140" stroke="#111827" stroke-width="4"/>

  <g stroke="#cbd5e1" stroke-width="1">
    <line x1="150" y1="510" x2="980" y2="510"/>
    <line x1="150" y1="440" x2="980" y2="440"/>
    <line x1="150" y1="370" x2="980" y2="370"/>
    <line x1="150" y1="300" x2="980" y2="300"/>
    <line x1="150" y1="230" x2="980" y2="230"/>
  </g>

  <text x="95" y="586" font-family="Arial, sans-serif" font-size="24" fill="#111827">0</text>
  <text x="90" y="516" font-family="Arial, sans-serif" font-size="24" fill="#111827">20</text>
  <text x="90" y="446" font-family="Arial, sans-serif" font-size="24" fill="#111827">40</text>
  <text x="90" y="376" font-family="Arial, sans-serif" font-size="24" fill="#111827">60</text>
  <text x="90" y="306" font-family="Arial, sans-serif" font-size="24" fill="#111827">80</text>

  <text x="370" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#111827">Antes de la manipulacion</text>
  <text x="760" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#111827">Despues de manipulacion</text>

  <text x="40" y="370" transform="rotate(-90 40 370)" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#111827">Promedio de colonias bacterianas</text>

  <polyline points="370,545 760,335" fill="none" stroke="#1d4ed8" stroke-width="5"/>
  <circle cx="370" cy="545" r="9" fill="#1d4ed8"/>
  <circle cx="760" cy="335" r="9" fill="#1d4ed8"/>

  <polyline points="370,545 760,475" fill="none" stroke="#dc2626" stroke-width="5"/>
  <circle cx="370" cy="545" r="9" fill="#dc2626"/>
  <circle cx="760" cy="475" r="9" fill="#dc2626"/>

  <rect x="230" y="110" width="26" height="26" fill="#1d4ed8"/>
  <text x="270" y="130" font-family="Arial, sans-serif" font-size="24" fill="#111827">Panaderia que no divide tareas</text>
  <rect x="650" y="110" width="26" height="26" fill="#dc2626"/>
  <text x="690" y="130" font-family="Arial, sans-serif" font-size="24" fill="#111827">Panaderia que divide tareas</text>
</svg>
