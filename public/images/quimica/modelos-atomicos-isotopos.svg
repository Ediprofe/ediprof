<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">Modelos atómicos de cuatro elementos</title>
  <desc id="desc">Cuatro átomos con niveles de energía y leyenda de protones, neutrones y electrones.</desc>

  <defs>
    <style>
      .txt { font-family: Arial, Helvetica, sans-serif; fill: #4a4a4a; font-weight: 700; }
      .idx { font-size: 42px; }
      .lbl { font-size: 30px; font-weight: 600; }
      .shell { fill: none; stroke: #7a7a7a; stroke-width: 4; }
      .p { fill: #ffffff; stroke: #666666; stroke-width: 2.4; }
      .n { fill: #666666; stroke: #555555; stroke-width: 2.4; }
      .e { fill: #8a8a8a; stroke: #5f5f5f; stroke-width: 2.4; }
    </style>
  </defs>

  <rect width="1600" height="560" fill="#f5f5f5"/>

  <!-- ÁTOMO 1 : 6e (2+4), 6p, 6n -->
  <g transform="translate(220,230)">
    <text class="txt idx" x="-10" y="-145">1</text>
    <circle class="shell" cx="0" cy="0" r="56"/>
    <circle class="shell" cx="0" cy="0" r="92"/>

    <!-- Electrones -->
    <circle class="e" cx="-56" cy="0" r="13"/>
    <circle class="e" cx="56" cy="0" r="13"/>
    <circle class="e" cx="0" cy="-92" r="13"/>
    <circle class="e" cx="92" cy="0" r="13"/>
    <circle class="e" cx="0" cy="92" r="13"/>
    <circle class="e" cx="-92" cy="0" r="13"/>

    <!-- Núcleo 6p + 6n -->
    <circle class="p" cx="-18" cy="-20" r="12"/>
    <circle class="n" cx="0" cy="-20" r="12"/>
    <circle class="p" cx="18" cy="-20" r="12"/>
    <circle class="n" cx="-27" cy="-2" r="12"/>
    <circle class="p" cx="-9" cy="-2" r="12"/>
    <circle class="n" cx="9" cy="-2" r="12"/>
    <circle class="p" cx="27" cy="-2" r="12"/>
    <circle class="n" cx="-18" cy="16" r="12"/>
    <circle class="p" cx="0" cy="16" r="12"/>
    <circle class="n" cx="18" cy="16" r="12"/>
    <circle class="p" cx="-9" cy="34" r="12"/>
    <circle class="n" cx="9" cy="34" r="12"/>
  </g>

  <!-- ÁTOMO 2 : 5e (2+3), 6p, 6n -->
  <g transform="translate(600,230)">
    <text class="txt idx" x="-10" y="-145">2</text>
    <circle class="shell" cx="0" cy="0" r="56"/>
    <circle class="shell" cx="0" cy="0" r="92"/>

    <!-- Electrones -->
    <circle class="e" cx="-56" cy="0" r="13"/>
    <circle class="e" cx="56" cy="0" r="13"/>
    <circle class="e" cx="0" cy="-92" r="13"/>
    <circle class="e" cx="-80" cy="46" r="13"/>
    <circle class="e" cx="80" cy="46" r="13"/>

    <!-- Núcleo 6p + 6n -->
    <circle class="p" cx="-18" cy="-20" r="12"/>
    <circle class="n" cx="0" cy="-20" r="12"/>
    <circle class="p" cx="18" cy="-20" r="12"/>
    <circle class="n" cx="-27" cy="-2" r="12"/>
    <circle class="p" cx="-9" cy="-2" r="12"/>
    <circle class="n" cx="9" cy="-2" r="12"/>
    <circle class="p" cx="27" cy="-2" r="12"/>
    <circle class="n" cx="-18" cy="16" r="12"/>
    <circle class="p" cx="0" cy="16" r="12"/>
    <circle class="n" cx="18" cy="16" r="12"/>
    <circle class="p" cx="-9" cy="34" r="12"/>
    <circle class="n" cx="9" cy="34" r="12"/>
  </g>

  <!-- ÁTOMO 3 : 6e (2+4), 6p, 7n -->
  <g transform="translate(980,230)">
    <text class="txt idx" x="-10" y="-145">3</text>
    <circle class="shell" cx="0" cy="0" r="56"/>
    <circle class="shell" cx="0" cy="0" r="92"/>

    <!-- Electrones -->
    <circle class="e" cx="-56" cy="0" r="13"/>
    <circle class="e" cx="56" cy="0" r="13"/>
    <circle class="e" cx="0" cy="-92" r="13"/>
    <circle class="e" cx="92" cy="0" r="13"/>
    <circle class="e" cx="0" cy="92" r="13"/>
    <circle class="e" cx="-92" cy="0" r="13"/>

    <!-- Núcleo 6p + 7n -->
    <circle class="p" cx="-18" cy="-20" r="12"/>
    <circle class="n" cx="0" cy="-20" r="12"/>
    <circle class="p" cx="18" cy="-20" r="12"/>
    <circle class="n" cx="-27" cy="-2" r="12"/>
    <circle class="p" cx="-9" cy="-2" r="12"/>
    <circle class="n" cx="9" cy="-2" r="12"/>
    <circle class="p" cx="27" cy="-2" r="12"/>
    <circle class="n" cx="-18" cy="16" r="12"/>
    <circle class="p" cx="0" cy="16" r="12"/>
    <circle class="n" cx="18" cy="16" r="12"/>
    <circle class="p" cx="-9" cy="34" r="12"/>
    <circle class="n" cx="9" cy="34" r="12"/>
    <circle class="n" cx="27" cy="34" r="12"/>
  </g>

  <!-- ÁTOMO 4 : 7e (2+5), 7p, 7n -->
  <g transform="translate(1360,230)">
    <text class="txt idx" x="-10" y="-145">4</text>
    <circle class="shell" cx="0" cy="0" r="56"/>
    <circle class="shell" cx="0" cy="0" r="92"/>

    <!-- Electrones -->
    <circle class="e" cx="-56" cy="0" r="13"/>
    <circle class="e" cx="56" cy="0" r="13"/>
    <circle class="e" cx="0" cy="-92" r="13"/>
    <circle class="e" cx="88" cy="-25" r="13"/>
    <circle class="e" cx="88" cy="25" r="13"/>
    <circle class="e" cx="0" cy="92" r="13"/>
    <circle class="e" cx="-92" cy="0" r="13"/>

    <!-- Núcleo 7p + 7n -->
    <circle class="p" cx="-18" cy="-20" r="12"/>
    <circle class="n" cx="0" cy="-20" r="12"/>
    <circle class="p" cx="18" cy="-20" r="12"/>
    <circle class="n" cx="-27" cy="-2" r="12"/>
    <circle class="p" cx="-9" cy="-2" r="12"/>
    <circle class="n" cx="9" cy="-2" r="12"/>
    <circle class="p" cx="27" cy="-2" r="12"/>
    <circle class="n" cx="-18" cy="16" r="12"/>
    <circle class="p" cx="0" cy="16" r="12"/>
    <circle class="n" cx="18" cy="16" r="12"/>
    <circle class="p" cx="-18" cy="34" r="12"/>
    <circle class="n" cx="0" cy="34" r="12"/>
    <circle class="p" cx="18" cy="34" r="12"/>
    <circle class="n" cx="36" cy="34" r="12"/>
  </g>

  <!-- Leyenda -->
  <g transform="translate(530,510)">
    <circle class="p" cx="0" cy="0" r="13"/>
    <text class="txt lbl" x="24" y="9">Protones</text>

    <circle class="n" cx="260" cy="0" r="13"/>
    <text class="txt lbl" x="284" y="9">Neutrones</text>

    <circle class="e" cx="560" cy="0" r="13"/>
    <text class="txt lbl" x="584" y="9">Electrones</text>
  </g>
</svg>
