<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1200" viewBox="0 0 1400 1200" role="img" aria-labelledby="title desc">
  <title id="title">Modelos atómicos de dos átomos</title>
  <desc id="desc">Ilustración de dos átomos con protones, neutrones y electrones para analizar número atómico y número másico.</desc>

  <defs>
    <style>
      .bg { fill: #f7f7f7; }
      .shell { fill: none; stroke: #4f5561; stroke-width: 4; }
      .p { fill: #b8bec9; stroke: #626c79; stroke-width: 2.2; }
      .n { fill: #ffffff; stroke: #606875; stroke-width: 2.2; }
      .e { fill: #1f2430; stroke: #10141c; stroke-width: 2.2; }
      .lbl { font-family: Arial, Helvetica, sans-serif; fill: #2b2f36; }
      .legend { font-size: 44px; font-weight: 700; }
      .stat { font-size: 56px; font-weight: 700; }
      .small { font-size: 36px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1200" />

  <!-- ÁTOMO 1 -->
  <g transform="translate(360,300)">
    <!-- Capa -->
    <circle class="shell" cx="0" cy="0" r="170" />

    <!-- Electrones: 2 -->
    <circle class="e" cx="-170" cy="0" r="17" />
    <circle class="e" cx="170" cy="0" r="17" />

    <!-- Núcleo: 2 protones + 2 neutrones -->
    <circle class="p" cx="-22" cy="-16" r="18" />
    <circle class="n" cx="22" cy="-16" r="18" />
    <circle class="p" cx="-22" cy="22" r="18" />
    <circle class="n" cx="22" cy="22" r="18" />
  </g>

  <!-- Leyenda átomo 1 -->
  <g transform="translate(760,210)">
    <circle class="p" cx="0" cy="0" r="15" />
    <text class="lbl legend" x="34" y="14">2 protones</text>

    <circle class="n" cx="0" cy="82" r="15" />
    <text class="lbl legend" x="34" y="96">2 neutrones</text>

    <circle class="e" cx="0" cy="164" r="15" />
    <text class="lbl legend" x="34" y="178">2 electrones</text>

    <text class="lbl stat" x="120" y="300">Z = 2</text>
    <text class="lbl stat" x="120" y="368">A = 4</text>
  </g>

  <!-- ÁTOMO 2 -->
  <g transform="translate(360,840)">
    <!-- Capas -->
    <circle class="shell" cx="0" cy="0" r="120" />
    <circle class="shell" cx="0" cy="0" r="190" />

    <!-- Electrones: 2 en primera capa -->
    <circle class="e" cx="0" cy="-120" r="17" />
    <circle class="e" cx="0" cy="120" r="17" />

    <!-- Electrones: 3 en segunda capa -->
    <circle class="e" cx="0" cy="-190" r="17" />
    <circle class="e" cx="-165" cy="95" r="17" />
    <circle class="e" cx="165" cy="95" r="17" />

    <!-- Núcleo: 5 protones + 6 neutrones -->
    <circle class="p" cx="-35" cy="-38" r="16" />
    <circle class="n" cx="0" cy="-38" r="16" />
    <circle class="p" cx="35" cy="-38" r="16" />
    <circle class="n" cx="-52" cy="-8" r="16" />
    <circle class="p" cx="-17" cy="-8" r="16" />
    <circle class="n" cx="18" cy="-8" r="16" />
    <circle class="p" cx="53" cy="-8" r="16" />
    <circle class="n" cx="-35" cy="24" r="16" />
    <circle class="p" cx="0" cy="24" r="16" />
    <circle class="n" cx="35" cy="24" r="16" />
    <circle class="n" cx="0" cy="56" r="16" />
  </g>

  <!-- Leyenda átomo 2 -->
  <g transform="translate(760,700)">
    <circle class="p" cx="0" cy="0" r="15" />
    <text class="lbl legend" x="34" y="14">5 protones</text>

    <circle class="n" cx="0" cy="82" r="15" />
    <text class="lbl legend" x="34" y="96">6 neutrones</text>

    <circle class="e" cx="0" cy="164" r="15" />
    <text class="lbl legend" x="34" y="178">5 electrones</text>

    <text class="lbl stat" x="120" y="300">Z = 5</text>
    <text class="lbl stat" x="120" y="368">A = 11</text>
  </g>

  <text class="lbl small" x="58" y="66">Modelos atómicos de dos átomos</text>
</svg>
